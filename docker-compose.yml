services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak-uma-demo
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./startup/demo-realm.json:/opt/keycloak/data/import/demo-realm.json:ro
