server:
  port: ${PERMISSION_ADMIN_LOCAL_PORT:9100}

spring:
  application:
    name: permission-admin-local
  thymeleaf:
    cache: false

app:
  data-file: ${PERMISSION_ADMIN_LOCAL_DATA_FILE:permission-data/permission-model.json}
  security:
    username: ${PERMISSION_ADMIN_LOCAL_USERNAME:admin}
    password: ${PERMISSION_ADMIN_LOCAL_PASSWORD:admin}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  file:
    name: ${PERMISSION_ADMIN_LOCAL_LOG_FILE:logs/permission-admin-local.log}
