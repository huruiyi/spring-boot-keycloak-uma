<!DOCTYPE html>
<html lang="zh-CN" data-theme="corporate" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>策略维护</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" th:href="@{/assets/admin.css}">
</head>
<body>
<div class="shell">
  <aside th:replace="~{fragments :: sidebar}"></aside>
  <main class="main">
    <div class="page-title"><h1>策略维护</h1></div>
    <p class="notice" th:if="${message}" th:text="${message}"></p>
    <div class="split">
      <section class="panel">
        <table>
          <thead><tr><th>策略</th><th>类型</th><th>授权目标</th><th>说明</th><th>操作</th></tr></thead>
          <tbody>
          <tr th:each="policy : ${model.policies}">
            <td th:text="${policy.name()}"></td>
            <td th:text="${policy.type()}"></td>
            <td th:text="${policy.subject()}"></td>
            <td th:text="${policy.description()}"></td>
            <td class="actions">
              <a class="button secondary" th:href="@{/policies(name=${policy.name()})}">编辑</a>
              <form class="inline-form" th:action="@{/policies/delete}" method="post"
                    th:data-confirm-message="${policyDeleteImpacts != null ? policyDeleteImpacts[policy.name()] : '确认删除？'}"
                    onsubmit="return confirm(this.dataset.confirmMessage)">
                <input type="hidden" name="name" th:value="${policy.name()}">
                <button class="button danger" type="submit">删除</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </section>
      <section class="panel">
        <h2 th:text="${editing} ? '编辑策略' : '新增策略'">新增策略</h2>
        <form class="form" th:action="@{/policies}" th:object="${form}" method="post">
          <div class="field"><label>策略名</label><input th:field="*{name}" th:readonly="${editing}" placeholder="policy-auditor"></div>
          <div class="field">
            <label>类型</label>
            <select id="policy-type-select" th:field="*{type}">
              <option value="role">role</option>
              <option value="user">user</option>
              <option value="client">client</option>
            </select>
          </div>
          <div class="field">
            <label>授权目标</label>
            <select id="policy-target-select" th:field="*{target}">
              <option value="">请选择授权目标</option>
              <optgroup label="Realm Role" data-policy-type="role">
                <option th:each="role : ${model.realmRoles}" th:value="${role.name()}" th:text="${role.name()}"></option>
              </optgroup>
              <optgroup label="用户" data-policy-type="user">
                <option th:each="user : ${model.users}" th:value="${user.username()}" th:text="${user.username()}"></option>
              </optgroup>
              <optgroup label="Client" data-policy-type="client">
                <option th:each="client : ${model.clients}" th:value="${client.clientId()}" th:text="${client.clientId()}"></option>
              </optgroup>
            </select>
          </div>
          <div class="field"><label>说明</label><input th:field="*{description}" placeholder="审计员策略"></div>
          <div class="actions">
            <button class="button" type="submit">保存</button>
            <a class="button secondary" th:if="${editing}" th:href="@{/policies}">取消</a>
          </div>
        </form>
      </section>
    </div>
  </main>
</div>
<script>
  const policyTypeSelect = document.getElementById('policy-type-select');
  const policyTargetSelect = document.getElementById('policy-target-select');
  function filterPolicyTargets() {
    const selectedType = policyTypeSelect.value || 'role';
    let selectedTargetVisible = false;
    policyTargetSelect.querySelectorAll('optgroup').forEach(group => {
      const visible = group.dataset.policyType === selectedType;
      group.hidden = !visible;
      if (visible && [...group.children].some(option => option.selected)) {
        selectedTargetVisible = true;
      }
    });
    if (!selectedTargetVisible) {
      policyTargetSelect.value = '';
    }
  }
  policyTypeSelect.addEventListener('change', filterPolicyTargets);
  filterPolicyTargets();
</script>
</body>
</html>
