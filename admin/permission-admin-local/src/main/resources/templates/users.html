<!DOCTYPE html>
<html lang="zh-CN" data-theme="corporate" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>用户维护</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" th:href="@{/assets/admin.css}">
</head>
<body>
<div class="shell">
  <aside th:replace="~{fragments :: sidebar}"></aside>
  <main class="main">
    <div class="page-title"><h1>用户维护</h1></div>
    <p class="notice" th:if="${message}" th:text="${message}"></p>
    <div class="split">
      <section class="panel">
        <table>
          <thead>
          <tr>
            <th>用户名</th>
            <th>邮箱</th>
            <th>Realm Role</th>
            <th>操作</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="user : ${model.users}">
            <td th:text="${user.username()}"></td>
            <td th:text="${user.email()}"></td>
            <td><span class="tag" th:each="role : ${user.realmRoles()}" th:text="${role}"></span></td>
            <td class="actions">
              <a class="button secondary" th:href="@{/users(username=${user.username()})}">编辑</a>
              <form class="inline-form" th:action="@{/users/delete}" method="post"
                    th:data-confirm-message="${userDeleteImpacts != null ? userDeleteImpacts[user.username()] : '确认删除？'}"
                    onsubmit="return confirm(this.dataset.confirmMessage)">
                <input type="hidden" name="username" th:value="${user.username()}">
                <button class="button danger" type="submit">删除</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </section>
      <section class="panel">
        <h2 th:text="${editing} ? '编辑用户' : '新增用户'">新增用户</h2>
        <form class="form" th:action="@{/users}" th:object="${form}" method="post">
          <div class="field">
            <label>用户名</label>
            <input th:field="*{username}" th:readonly="${editing}" placeholder="auditor">
          </div>
          <div class="field">
            <label>邮箱</label>
            <input th:field="*{email}" placeholder="auditor@example.com">
          </div>
          <div class="field">
            <label>密码</label>
            <input th:field="*{password}" placeholder="编辑时留空则不重置密码">
            <small class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></small>
          </div>
          <div class="field">
            <label>Realm Role</label>
            <select class="multi-select" th:field="*{realmRoles}" multiple>
              <option th:each="role : ${model.realmRoles}" th:value="${role.name()}" th:text="${role.name()}"></option>
            </select>
          </div>
          <div class="actions">
            <button class="button" type="submit">保存</button>
            <a class="button secondary" th:if="${editing}" th:href="@{/users}">取消</a>
          </div>
        </form>
      </section>
    </div>
  </main>
</div>
</body>
</html>
