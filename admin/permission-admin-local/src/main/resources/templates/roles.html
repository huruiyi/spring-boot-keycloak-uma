<!DOCTYPE html>
<html lang="zh-CN" data-theme="corporate" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>领域角色维护</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" th:href="@{/assets/admin.css}">
  <script th:src="@{/assets/theme.js}"></script>
</head>
<body><div class="shell"><aside th:replace="~{fragments :: sidebar}"></aside><main class="main"><div class="page-title"><h1>领域角色维护</h1></div><p class="notice" th:if="${message}" th:text="${message}"></p><div class="split"><section class="panel"><table><thead><tr><th>角色</th><th>说明</th><th>操作</th></tr></thead><tbody><tr th:each="role : ${model.realmRoles}"><td th:text="${role.name()}"></td><td th:text="${role.description()}"></td><td class="actions"><form class="inline-form" th:action="@{/roles/delete}" method="post" th:data-confirm-message="${roleDeleteImpacts != null ? roleDeleteImpacts[role.name()] : '确认删除？'}" onsubmit="return confirm(this.dataset.confirmMessage)"><input type="hidden" name="name" th:value="${role.name()}"><button class="button danger" type="submit">删除</button></form></td></tr></tbody></table></section><section class="panel"><h2 th:text="${editing} ? '编辑领域角色' : '新增领域角色'">新增领域角色</h2><form class="form" th:action="@{/roles}" th:object="${form}" method="post"><div class="field"><label>角色名</label><input th:field="*{name}" th:readonly="${editing}" placeholder="auditor"></div><div class="field"><label>说明</label><input th:field="*{description}" placeholder="角色用途说明"></div><div class="actions"><button class="button" type="submit">保存</button><a class="button secondary" th:if="${editing}" th:href="@{/roles}">取消</a></div></form></section></div></main></div></body></html>
