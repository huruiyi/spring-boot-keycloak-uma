server:
  port: ${PERMISSION_ADMIN_KEYCLOAK_PORT:9200}
  servlet:
    session:
      cookie:
        name: KEYCLOAK_ADMIN_SESSION

spring:
  application:
    name: permission-admin-keycloak
  thymeleaf:
    cache: false

app:
  keycloak:
    url: ${KEYCLOAK_URL:http://localhost:8080}
    realm: ${KEYCLOAK_REALM:demo}
    admin-user: ${KEYCLOAK_ADMIN_USER:admin}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
    resource-server-client-id: ${KEYCLOAK_RESOURCE_SERVER_CLIENT_ID:demo-api}
    managed-clients: ${KEYCLOAK_MANAGED_CLIENTS:demo-frontend,demo-api}
    endpoint-attribute: ${KEYCLOAK_ENDPOINT_ATTRIBUTE:permissionAdmin.endpoints}
  security:
    username: ${PERMISSION_ADMIN_KEYCLOAK_USERNAME:admin}
    password: ${PERMISSION_ADMIN_KEYCLOAK_PASSWORD:admin}
    readonly-username: ${PERMISSION_ADMIN_KEYCLOAK_READONLY_USERNAME:viewer}
    readonly-password: ${PERMISSION_ADMIN_KEYCLOAK_READONLY_PASSWORD:viewer}
    user-admin-username: ${PERMISSION_ADMIN_KEYCLOAK_USER_ADMIN_USERNAME:user-admin}
    user-admin-password: ${PERMISSION_ADMIN_KEYCLOAK_USER_ADMIN_PASSWORD:user-admin}
    policy-admin-username: ${PERMISSION_ADMIN_KEYCLOAK_POLICY_ADMIN_USERNAME:policy-admin}
    policy-admin-password: ${PERMISSION_ADMIN_KEYCLOAK_POLICY_ADMIN_PASSWORD:policy-admin}
    sync-admin-username: ${PERMISSION_ADMIN_KEYCLOAK_SYNC_ADMIN_USERNAME:sync-admin}
    sync-admin-password: ${PERMISSION_ADMIN_KEYCLOAK_SYNC_ADMIN_PASSWORD:sync-admin}
  audit:
    file: ${PERMISSION_ADMIN_KEYCLOAK_AUDIT_FILE:logs/permission-admin-keycloak-audit.log}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  file:
    name: ${PERMISSION_ADMIN_KEYCLOAK_LOG_FILE:logs/permission-admin-keycloak.log}
