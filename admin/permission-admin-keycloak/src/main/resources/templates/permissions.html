<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Permission 维护</title>
  <link rel="stylesheet" th:href="@{/assets/admin.css}">
</head>
<body>
<div class="shell">
  <aside th:replace="~{fragments :: sidebar}"></aside>
  <main class="main">
    <div class="page-title"><h1>Permission 维护</h1></div>
    <p class="notice" th:if="${message}" th:text="${message}"></p>
    <div class="split">
      <section class="panel">
        <table>
          <thead><tr><th>Permission</th><th>Resource</th><th>Scope</th><th>Policy</th><th>申请格式</th><th>操作</th></tr></thead>
          <tbody>
          <tr th:each="permission : ${model.permissions}">
            <td th:text="${permission.name()}"></td>
            <td th:text="${permission.resource()}"></td>
            <td th:text="${permission.scope()}"></td>
            <td><span class="tag" th:each="policy : ${permission.policies()}" th:text="${policy}"></span></td>
            <td><span class="tag" th:text="${permission.resource() + '#' + permission.scope()}"></span></td>
            <td class="actions">
              <a class="button secondary" th:href="@{/permissions(name=${permission.name()})}">编辑</a>
              <form class="inline-form" th:action="@{/permissions/delete}" method="post">
                <input type="hidden" name="name" th:value="${permission.name()}">
                <button class="button danger" type="submit">删除</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </section>
      <section class="panel">
        <h2 th:text="${editing} ? '编辑 Permission' : '新增 Permission'">新增 Permission</h2>
        <form class="form" th:action="@{/permissions}" th:object="${form}" method="post">
          <div class="field"><label>名称</label><input th:field="*{name}" th:readonly="${editing}" placeholder="perm-report-view"></div>
          <div class="field">
            <label>Resource</label>
            <select th:field="*{resource}">
              <option value="">请选择 Resource</option>
              <option th:each="resource : ${model.resources}" th:value="${resource.name()}" th:text="${resource.name()}"></option>
            </select>
          </div>
          <div class="field">
            <label>Scope</label>
            <select th:field="*{scope}">
              <option value="">请选择 Scope</option>
              <optgroup th:each="resource : ${model.resources}" th:label="${resource.name()}">
                <option th:each="scope : ${resource.scopes()}" th:value="${scope}" th:text="${scope}"></option>
              </optgroup>
            </select>
          </div>
          <div class="field">
            <label>Policy</label>
            <select class="multi-select" th:field="*{policies}" multiple>
              <option th:each="policy : ${model.policies}" th:value="${policy.name()}" th:text="${policy.name()}"></option>
            </select>
          </div>
          <div class="actions">
            <button class="button" type="submit">保存</button>
            <a class="button secondary" th:if="${editing}" th:href="@{/permissions}">取消</a>
          </div>
        </form>
      </section>
    </div>
  </main>
</div>
</body>
</html>
