<!DOCTYPE html>
<html lang="zh-CN" data-theme="corporate" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>系统接口权限</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" th:href="@{/assets/admin.css}">
  <script th:src="@{/assets/theme.js}"></script>
</head>
<body><div class="shell"><aside th:replace="~{fragments :: sidebar}"></aside><main class="main"><div class="page-title"><h1>系统接口权限</h1></div><p class="notice" th:if="${message}" th:text="${message}"></p><form class="toolbar" th:action="@{/endpoints/generate-defaults}" method="post"><button class="button secondary" type="submit">从权限规则生成默认接口权限</button></form><div class="split"><section class="panel"><table><thead><tr><th>名称</th><th>方法</th><th>路径</th><th>权限</th><th>操作</th></tr></thead><tbody><tr th:each="endpoint : ${model.endpoints}"><td th:text="${endpoint.name()}"></td><td th:text="${endpoint.method()}"></td><td th:text="${endpoint.path()}"></td><td><span class="tag" th:text="${endpoint.permission()}"></span></td><td><form class="inline-form" th:action="@{/endpoints/delete}" method="post" th:data-confirm-message="${endpointDeleteImpacts != null ? endpointDeleteImpacts[endpoint.name()] : '确认删除？'}" onsubmit="return confirm(this.dataset.confirmMessage)"><input type="hidden" name="name" th:value="${endpoint.name()}"><button class="button danger" type="submit">删除</button></form></td></tr></tbody></table></section><section class="panel"><h2>新增或覆盖接口权限</h2><form class="form" th:action="@{/endpoints}" th:object="${form}" method="post"><div class="field"><label>名称</label><input th:field="*{name}" placeholder="报表列表"></div><div class="field"><label>方法</label><select th:field="*{method}"><option>GET</option><option>POST</option><option>PUT</option><option>DELETE</option><option>PATCH</option></select></div><div class="field"><label>路径</label><input th:field="*{path}" placeholder="/api/reports"></div><div class="field"><label>权限</label><select th:field="*{permission}"><option value="">请选择权限</option><option th:each="permission : ${model.permissions}" th:value="${permission.resource() + '#' + permission.scope()}" th:text="${permission.resource() + '#' + permission.scope()}"></option></select></div><button class="button" type="submit">保存</button></form></section></div></main></div></body></html>
