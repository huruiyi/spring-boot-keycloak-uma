<!DOCTYPE html>
<html lang="zh-CN" data-theme="corporate" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>策略维护</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" th:href="@{/assets/admin.css}">
  <script th:src="@{/assets/theme.js}"></script>
</head>
<body><div class="shell"><aside th:replace="~{fragments :: sidebar}"></aside><main class="main"><div class="page-title"><h1>策略维护</h1></div><p class="notice" th:if="${message}" th:text="${message}"></p><div class="split"><section class="panel"><table><thead><tr><th>策略</th><th>类型</th><th>授权目标</th><th>说明</th><th>操作</th></tr></thead><tbody><tr th:each="policy : ${model.policies}"><td th:text="${policy.name()}"></td><td th:text="${policy.type() == 'role' ? '角色' : policy.type() == 'user' ? '用户' : '客户端'}"></td><td><span class="tag" th:text="${policy.subject()}"></span></td><td th:text="${policy.description()}"></td><td class="actions"><a class="button secondary" th:href="@{/policies(name=${policy.name()})}">编辑</a><form class="inline-form" th:action="@{/policies/delete}" method="post" th:data-confirm-message="${policyDeleteImpacts != null ? policyDeleteImpacts[policy.name()] : '确认删除？'}" onsubmit="return confirm(this.dataset.confirmMessage)"><input type="hidden" name="name" th:value="${policy.name()}"><button class="button danger" type="submit">删除</button></form></td></tr></tbody></table></section><section class="panel"><h2 th:text="${editing} ? '编辑策略' : '新增策略'">新增策略</h2><form class="form" th:action="@{/policies}" th:object="${form}" method="post"><div class="field"><label>策略名</label><input th:field="*{name}" th:readonly="${editing}" placeholder="policy-auditor"></div><div class="field"><label>类型</label><select th:field="*{type}" data-policy-type><option value="role">角色</option><option value="user">用户</option><option value="client">客户端</option></select></div><div class="field"><label>授权目标</label><select name="target" data-policy-target><option value="">请选择授权目标</option><optgroup label="领域角色" data-target-type="role"><option th:each="role : ${model.realmRoles}" th:value="${role.name()}" th:selected="${form.type == 'role' and form.target == role.name()}" th:text="${role.name()}"></option></optgroup><optgroup label="用户" data-target-type="user"><option th:each="user : ${model.users}" th:value="${user.username()}" th:selected="${form.type == 'user' and form.target == user.username()}" th:text="${user.username()}"></option></optgroup><optgroup label="客户端" data-target-type="client"><option th:each="client : ${model.clients}" th:value="${client.clientId()}" th:selected="${form.type == 'client' and form.target == client.clientId()}" th:text="${client.clientId()}"></option></optgroup></select></div><div class="field"><label>说明</label><input th:field="*{description}" placeholder="策略用途说明"></div><div class="actions"><button class="button" type="submit">保存</button><a class="button secondary" th:if="${editing}" th:href="@{/policies}">取消</a></div></form></section></div><script>function filterPolicyTargets(){var type=document.querySelector('[data-policy-type]');var target=document.querySelector('[data-policy-target]');if(!type||!target)return;target.querySelectorAll('optgroup').forEach(function(group){var show=group.dataset.targetType===type.value;group.disabled=!show;group.hidden=!show;});var selected=target.options[target.selectedIndex];if(selected&&selected.parentElement&&selected.parentElement.dataset.targetType!==type.value){target.value='';}}document.addEventListener('DOMContentLoaded',function(){filterPolicyTargets();var type=document.querySelector('[data-policy-type]');if(type)type.addEventListener('change',filterPolicyTargets);});</script></main></div></body></html>
