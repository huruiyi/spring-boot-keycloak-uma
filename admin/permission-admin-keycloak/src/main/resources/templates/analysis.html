<!DOCTYPE html>
<html lang="zh-CN" data-theme="corporate" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>权限分析</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" th:href="@{/assets/admin.css}">
  <script th:src="@{/assets/theme.js}"></script>
</head>
<body><div class="shell"><aside th:replace="~{fragments :: sidebar}"></aside><main class="main"><div class="page-title"><h1>权限分析</h1></div><p class="notice" th:if="${message}" th:text="${message}"></p><section class="panel"><h2>后端接口扫描</h2><form class="toolbar" th:action="@{/analysis/import-scanned-endpoints}" method="post"><button class="button secondary" type="submit">导入后端扫描接口</button></form><table><thead><tr><th>方法</th><th>路径</th><th>权限</th><th>状态</th></tr></thead><tbody><tr th:each="candidate : ${scanCandidates}"><td th:text="${candidate.method()}"></td><td th:text="${candidate.path()}"></td><td><span class="tag" th:text="${candidate.permission()}"></span></td><td th:text="${candidate.maintained()} ? '已维护' : '待导入'"></td></tr></tbody></table></section><section class="panel"><h2>使用分析</h2><p th:if="${#lists.isEmpty(usageIssues)}">暂无使用问题。</p><table th:if="${!#lists.isEmpty(usageIssues)}"><thead><tr><th>类型</th><th>名称</th><th>说明</th></tr></thead><tbody><tr th:each="issue : ${usageIssues}"><td th:text="${issue.type()}"></td><td th:text="${issue.name()}"></td><td th:text="${issue.message()}"></td></tr></tbody></table></section></main></div></body></html>
