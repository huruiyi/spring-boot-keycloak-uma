<!DOCTYPE html>
<html lang="zh-CN" data-theme="corporate" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>模型同步</title>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" th:href="@{/assets/admin.css}">
  <script th:src="@{/assets/theme.js}"></script>
</head>
<body><div class="shell"><aside th:replace="~{fragments :: sidebar}"></aside><main class="main"><div class="page-title"><h1>模型同步</h1></div><p class="notice" th:if="${message}" th:text="${message}"></p><div class="split"><section class="panel"><h2>导出 JSON</h2><p>导出当前权限模型，用于备份或同步到其他环境。</p><a class="button" th:href="@{/model-sync/export}">导出模型</a></section><section class="panel"><h2>导入 JSON</h2><form class="form" th:action="@{/model-sync/preview}" method="post"><div class="field"><label>模型 JSON</label><textarea name="json" rows="14" th:text="${modelJson}" placeholder="粘贴 permission-model.json 内容"></textarea></div><button class="button secondary" type="submit">预览变更</button></form></section></div><section class="panel" th:if="${changes}"><h2>变更预览</h2><table><thead><tr><th>类型</th><th>名称</th><th>变更</th></tr></thead><tbody><tr th:each="change : ${changes}"><td th:text="${change.type()}"></td><td th:text="${change.name()}"></td><td th:text="${change.description()}"></td></tr></tbody></table><form class="toolbar" th:action="@{/model-sync/import}" method="post"><input type="hidden" name="json" th:value="${modelJson}"><button class="button" type="submit">确认导入</button></form></section></main></div></body></html>
