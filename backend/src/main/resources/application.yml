server:
  port: 9000

spring:
  application:
    name: uma-backend
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/demo}

app:
  keycloak:
    url: ${KEYCLOAK_URL:http://localhost:8080}
    realm: ${KEYCLOAK_REALM:demo}
    admin-user: ${KEYCLOAK_ADMIN_USER:admin}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
    resource-server-client-id: ${KEYCLOAK_RESOURCE_SERVER_CLIENT_ID:demo-api}
    ui-permission-attribute: ${KEYCLOAK_UI_PERMISSION_ATTRIBUTE:uma.ui-permissions}
    ui-permission-cache-ttl: ${KEYCLOAK_UI_PERMISSION_CACHE_TTL:PT30S}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8081}

logging:
  pattern:
    level: "%5p traceId=%X{traceId:-}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
